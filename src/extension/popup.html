<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; font-size: 13px; padding: 16px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #f1f5f9; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; margin-top: 12px; }
    input[type="number"] { width: 100%; padding: 6px 10px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: 14px; }
    input:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .toggle { position: relative; width: 40px; height: 22px; background: #334155; border-radius: 11px; cursor: pointer; transition: background 0.2s; }
    .toggle.on { background: #3b82f6; }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle.on::after { transform: translateX(18px); }
    .status { margin-top: 16px; padding: 8px; border-radius: 6px; font-size: 12px; text-align: center; }
    .status.connected { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .status.disconnected { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <h2>Proto Studio</h2>

  <label for="port">Server Port</label>
  <input type="number" id="port" value="3700" min="1024" max="65535">

  <div class="toggle-row">
    <span>Overlay Enabled</span>
    <div class="toggle on" id="toggle"></div>
  </div>

  <div class="status disconnected" id="status">Checking...</div>

  <script src="popup.js"></script>
</body>
</html>
